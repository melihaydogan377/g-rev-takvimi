<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Proje Başarı Paneli | Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0f172a; color: white; font-family: 'Inter', sans-serif; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
        .custom-shadow { box-shadow: 0 0 20px rgba(56, 189, 248, 0.2); }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-6xl mx-auto">
        <header class="mb-8 flex justify-between items-end">
            <div>
                <h1 class="text-3xl font-bold text-sky-400">Verimlilik Analizi</h1>
                <p class="text-slate-400">Görevlerini tamamla, istatistiklerini yükselt.</p>
            </div>
            <div class="text-right">
                <span class="text-sm text-slate-400">Genel Başarı</span>
                <div class="text-2xl font-mono font-bold text-green-400" id="totalPercentage">0%</div>
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            
            <div class="lg:col-span-1 space-y-6">
                <div class="glass p-6 rounded-2xl custom-shadow">
                    <h2 class="text-xl font-semibold mb-4 text-sky-300">Yeni Görev</h2>
                    <div class="flex flex-col gap-3">
                        <input type="text" id="taskInput" placeholder="Görev adını yazın..." class="bg-slate-800 border border-slate-700 p-3 rounded-lg focus:outline-none focus:border-sky-500 text-white">
                        <button onclick="addTask()" class="bg-sky-600 hover:bg-sky-500 transition p-3 rounded-lg font-bold">Ekle</button>
                    </div>
                </div>

                <div class="glass p-6 rounded-2xl">
                    <h2 class="text-xl font-semibold mb-4">Görev Listesi</h2>
                    <ul id="taskList" class="space-y-3">
                        </ul>
                </div>
            </div>

            <div class="lg:col-span-2 space-y-6">
                <div class="glass p-6 rounded-2xl min-h-[400px] flex flex-col items-center justify-center">
                    <h2 class="text-xl font-semibold mb-6 text-center w-full text-slate-200">Haftalık Performans Grafiği</h2>
                    <canvas id="successChart"></canvas>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div class="glass p-4 rounded-xl text-center">
                        <p class="text-slate-400 text-sm">Tamamlanan</p>
                        <p id="completedCount" class="text-2xl font-bold text-green-400">0</p>
                    </div>
                    <div class="glass p-4 rounded-xl text-center">
                        <p class="text-slate-400 text-sm">Bekleyen</p>
                        <p id="pendingCount" class="text-2xl font-bold text-amber-400">0</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let tasks = [];
        let myChart;

        // Grafik Başlatma
        const ctx = document.getElementById('successChart').getContext('2d');
        myChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: ['Pzt', 'Sal', 'Çar', 'Per', 'Cum', 'Cmt', 'Paz'],
                datasets: [{
                    label: 'Başarı Oranı %',
                    data: [0, 0, 0, 0, 0, 0, 0], // Burası dinamikleşecek
                    borderColor: '#38bdf8',
                    backgroundColor: 'rgba(56, 189, 248, 0.1)',
                    fill: true,
                    tension: 0.4,
                    borderWidth: 3
                }]
            },
            options: {
                responsive: true,
                scales: {
                    y: { beginAtZero: true, max: 100, grid: { color: '#334155' } },
                    x: { grid: { display: false } }
                },
                plugins: { legend: { display: false } }
            }
        });

        function addTask() {
            const input = document.getElementById('taskInput');
            if (input.value.trim() === "") return;

            const newTask = {
                id: Date.now(),
                text: input.value,
                completed: false
            };

            tasks.push(newTask);
            input.value = "";
            renderTasks();
            updateStats();
        }

        function toggleTask(id) {
            tasks = tasks.map(t => t.id === id ? {...t, completed: !t.completed} : t);
            renderTasks();
            updateStats();
        }

        function deleteTask(id) {
            tasks = tasks.filter(t => t.id !== id);
            renderTasks();
            updateStats();
        }

        function renderTasks() {
            const list = document.getElementById('taskList');
            list.innerHTML = "";
            tasks.forEach(task => {
                list.innerHTML += `
                    <li class="flex items-center justify-between p-3 bg-slate-800 rounded-lg border border-slate-700 transition hover:border-slate-500">
                        <div class="flex items-center gap-3">
                            <input type="checkbox" onchange="toggleTask(${task.id})" ${task.completed ? 'checked' : ''} class="w-5 h-5 accent-sky-500">
                            <span class="${task.completed ? 'line-through text-slate-500' : 'text-slate-200'}">${task.text}</span>
                        </div>
                        <button onclick="deleteTask(${task.id})" class="text-red-400 hover:text-red-600 text-sm">Sil</button>
                    </li>
                `;
            });
        }

        function updateStats() {
            const total = tasks.length;
            const completed = tasks.filter(t => t.completed).length;
            const percentage = total === 0 ? 0 : Math.round((completed / total) * 100);

            document.getElementById('totalPercentage').innerText = percentage + "%";
            document.getElementById('completedCount').innerText = completed;
            document.getElementById('pendingCount').innerText = total - completed;

            // Grafiği simülasyon olarak bugüne güncelle (Örn: Bugün Cuma olsun)
            myChart.data.datasets[0].data[4] = percentage; 
            myChart.update();
        }
    </script>
</body>
</html>
